<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Guías Taller">
<meta name="theme-color" content="#35647F">
<title>Guías de trabajo — Taller</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3EAFA;
    --surface:#FFFFFF;
    --ink:#181820;
    --ink-soft:#454550;
    --line:#DDCBEE;
    --line-strong:#B98FDE;
    --blue:#8A4FD1;
    --blue-dark:#6B3AB0;
    --brand-pink:#fb66c5;
    --brand-purple:#a668e0;
    --brand-blue:#546ffd;
    --red:#C4291A;
    --green:#2E7D46;
    --mustard:#B8720E;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-weight:600;}
  #root{min-height:100vh;display:flex;flex-direction:column;}

  /* header */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 22px;border-bottom:2px solid var(--line-strong);
    background:linear-gradient(120deg, var(--brand-pink) 0%, var(--brand-purple) 55%, var(--brand-blue) 100%);
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{
    width:44px;height:44px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;
    overflow:hidden;border:2px solid rgba(255,255,255,.8);box-shadow:0 2px 6px rgba(0,0,0,.2);
  }
  .brand .mark img{width:100%;height:100%;object-fit:cover;display:block;}
  .brand h1{font-size:17px;margin:0;letter-spacing:.2px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.15);}
  .brand .sub{font-size:11px;color:rgba(255,255,255,.85);font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;}
  .gear{
    background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.5);border-radius:8px;
    width:34px;height:34px;cursor:pointer;font-size:16px;color:#fff;
  }
  .gear:hover{background:rgba(255,255,255,.35);}

  .settings-panel{
    padding:14px 22px;background:var(--surface);border-bottom:1px solid var(--line);
    display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;
  }
  .settings-panel label{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--ink-soft);}
  .settings-panel input{padding:8px 10px;}

  .app{
    flex:1;display:grid;grid-template-columns:340px 1fr;min-height:0;
  }

  /* sidebar */
  .sidebar{
    border-right:2px solid var(--line-strong);background:var(--surface);
    display:flex;flex-direction:column;min-height:0;
  }
  .sidebar-head{padding:14px 16px 10px;border-bottom:1px solid var(--line);}
  .search-input{width:100%;padding:9px 12px;border:1px solid var(--line-strong);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg);}
  .chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .chip{
    font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:10.5px;padding:5px 9px;border-radius:20px;
    border:1px solid var(--line-strong);background:transparent;cursor:pointer;color:var(--ink-soft);
  }
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .new-btn{
    margin:12px 16px 4px;padding:10px 12px;border:none;border-radius:8px;background:var(--blue);
    color:#fff;font-weight:600;font-size:13px;cursor:pointer;
  }
  .new-btn:hover{background:var(--blue-dark);}
  .ticket-list{flex:1;overflow-y:auto;padding:8px 12px 20px;}
  .ticket-item{
    background:var(--bg);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;margin-bottom:8px;cursor:pointer;position:relative;
  }
  .ticket-item:hover{border-color:var(--line-strong);}
  .ticket-item.active{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue) inset;}
  .ticket-item .row1{display:flex;justify-content:space-between;align-items:baseline;}
  .ticket-item .folio{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:11px;color:var(--ink-soft);}
  .ticket-item .name{font-weight:600;font-size:13.5px;margin-top:2px;}
  .ticket-item .meta{font-size:11px;color:var(--ink-soft);margin-top:4px;}
  .estado-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
  .empty-list{padding:30px 16px;text-align:center;color:var(--ink-soft);font-size:13px;}

  /* main */
  .main{padding:24px 30px;overflow-y:auto;min-height:0;}
  .back-btn{display:none;border:none;background:none;color:var(--blue);font-weight:600;font-size:13px;cursor:pointer;margin-bottom:12px;}

  .empty-state{
    height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--ink-soft);text-align:center;gap:8px;
  }
  .empty-state .mono{font-size:12px;}

  /* ticket paper */
  .ticket-paper{
    background:var(--surface);border:1px solid var(--line-strong);border-radius:var(--radius);
    max-width:640px;overflow:hidden;box-shadow:0 2px 0 var(--line);
  }
  .ticket-stub{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 20px;border-bottom:2px dashed var(--line-strong);
  }
  .ticket-stub .folio-big{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:22px;font-weight:700;}
  .ticket-stub .folio-label{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;}
  .estado-badge{
    font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:11px;padding:5px 10px;border-radius:20px;color:#fff;
    text-transform:uppercase;letter-spacing:.04em;
  }
  .ruler-wrap{padding:0 20px;background:var(--surface);}
  .ruler-svg{width:100%;display:block;height:26px;}
  .ticket-body{padding:18px 20px 22px;}
  .section-label{
    font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:10.5px;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;
  }
  .section-label:first-child{margin-top:0;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field{margin-bottom:10px;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;}
  .field input,.field select,.field textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line-strong);border-radius:7px;
    font-family:inherit;font-size:13.5px;background:#fff;color:var(--ink);
  }
  .field textarea{resize:vertical;min-height:70px;}
  .money-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .saldo-box{background:var(--bg);border:1px solid var(--line-strong);border-radius:7px;padding:9px 10px;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:14px;font-weight:700;}

  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;font-size:13.5px;}
  .detail-grid .k{color:var(--ink-soft);font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-top:10px;}
  .detail-grid .v{margin-bottom:2px;}
  .detail-full{grid-column:1/-1;}

  .msg-preview{
    background:var(--bg);border:1px dashed var(--line-strong);border-radius:8px;
    padding:12px 14px;font-size:12.5px;white-space:pre-wrap;color:var(--ink);margin-top:8px;
    font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;line-height:1.55;
  }

  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
  .btn{
    border:none;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;
    font-family:inherit;
  }
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:var(--blue-dark);}
  .btn-whatsapp{background:#3E9C55;color:#fff;}
  .btn-whatsapp:hover{background:#337F45;}
  .btn-ghost{background:transparent;border:1px solid var(--line-strong);color:var(--ink);}
  .btn-ghost:hover{background:var(--bg);}
  .btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);}
  .btn-danger:hover{background:#fbeceb;}
  .estado-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
  .estado-actions button{
    font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:10.5px;padding:6px 10px;border-radius:20px;
    border:1px solid var(--line-strong);background:transparent;cursor:pointer;color:var(--ink-soft);
  }
  .estado-actions button.active{color:#fff;border-color:transparent;}

  .urgency-banner{margin:0 16px 8px;display:flex;gap:8px;flex-wrap:wrap;}
  .ub-item{font-size:11px;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;padding:5px 9px;border-radius:6px;}
  .ub-late{background:#FBE9E7;color:#7a2a22;}
  .ub-today{background:#FBF0DD;color:#7a5414;}

  .ticket-item.urg-atrasado{border-left:4px solid var(--red);}
  .ticket-item.urg-hoy{border-left:4px solid var(--mustard);}
  .urg-tag{font-size:10.5px;font-weight:700;margin-top:5px;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;}
  .urg-tag-late{color:var(--red);}
  .urg-tag-today{color:var(--mustard);}

  .detail-alert{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:14px;}
  .detail-alert-late{background:#FBE9E7;color:#7a2a22;}
  .detail-alert-today{background:#FBF0DD;color:#7a5414;}

  .btn-reminder{background:var(--mustard);color:#fff;}
  .btn-reminder:hover{background:#8f671f;}
  .hint-text{font-size:12px;color:var(--ink-soft);margin-top:10px;}

  .emp-chip{
    display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line-strong);
    border-radius:20px;padding:5px 6px 5px 10px;font-size:12px;
  }
  .emp-chip button{border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:11px;padding:2px 4px;}
  .emp-chip button:hover{color:var(--red);}
  .emp-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}

  .client-history{
    margin-top:6px;font-size:11.5px;background:var(--bg);border:1px dashed var(--line-strong);
    border-radius:7px;padding:8px 10px;color:var(--ink-soft);
  }
  .client-history strong{color:var(--ink);}
  .autofill-btn{
    display:inline-block;margin-top:6px;background:var(--blue);color:#fff;border:none;
    border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;
  }
  .autofill-btn:hover{background:var(--blue-dark);}

  .item-row{
    display:grid;grid-template-columns:22px 140px 1fr 105px 90px 28px;gap:8px;align-items:start;
    margin-bottom:8px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px;
  }
  .item-num{
    font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:12px;color:var(--ink-soft);
    background:var(--surface);border-radius:50%;width:22px;height:22px;display:flex;
    align-items:center;justify-content:center;border:1px solid var(--line-strong);margin-top:2px;
  }
  .item-row input.item-prenda{padding:8px 9px;border:1px solid var(--line-strong);border-radius:6px;font-size:13px;font-family:inherit;}
  .item-row textarea.item-detalle{padding:8px 9px;border:1px solid var(--line-strong);border-radius:6px;font-size:13px;font-family:inherit;min-height:44px;resize:vertical;}
  .item-fecha-wrap{display:flex;flex-direction:column;gap:3px;}
  .item-fecha-wrap label{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;}
  .item-fecha-wrap input.item-fecha,.item-fecha-wrap input.item-valor{padding:7px 6px;border:1px solid var(--line-strong);border-radius:6px;font-size:12px;font-family:inherit;width:100%;}
  .item-remove{
    border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:14px;
    width:28px;height:28px;border-radius:6px;
  }
  .item-remove:hover{background:#fbeceb;color:var(--red);}
  .item-remove-spacer{width:28px;display:inline-block;}
  .items-total-hint{font-size:12.5px;color:var(--ink-soft);text-align:right;margin:2px 4px 10px;}
  @media (max-width:760px){
    .item-row{grid-template-columns:22px 1fr 28px;}
    .item-row input.item-prenda{grid-column:2/3;}
    .item-row textarea.item-detalle{grid-column:2/3;}
    .item-fecha-wrap{grid-column:2/3;}
  }

  .detail-item-row{
    display:grid;grid-template-columns:130px 1fr 110px 90px;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);
  }
  .detail-item-row:last-child{border-bottom:none;}
  .detail-item-row .item-name{font-weight:600;font-size:13.5px;}
  .detail-item-row .item-desc{font-size:13px;color:var(--ink-soft);white-space:pre-wrap;}
  .detail-item-row .item-entrega{font-size:12px;color:var(--ink-soft);text-align:right;}
  @media (max-width:600px){
    .detail-item-row{grid-template-columns:1fr;gap:2px;}
    .detail-item-row .item-entrega{text-align:left;}
  }

  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:16px 0;max-width:640px;}
  .summary-card{background:var(--surface);border:1px solid var(--line-strong);border-radius:10px;padding:14px 16px;}
  .summary-card .num{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:26px;font-weight:700;}
  .summary-card .lbl{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
  .summary-list{font-size:12.5px;margin-top:6px;color:var(--ink-soft);}
  .summary-list div{padding:2px 0;}
  .summary-note{font-size:11px;color:var(--ink-soft);margin-top:4px;font-style:italic;}

  .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;max-width:900px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;max-width:900px;}
  .cal-grid-header{font-size:11px;text-transform:uppercase;color:var(--ink-soft);text-align:center;margin-bottom:4px;font-weight:600;}
  .cal-cell{
    background:var(--surface);border:1px solid var(--line);border-radius:8px;
    min-height:80px;padding:6px;font-size:11px;overflow:hidden;
  }
  .cal-cell.cal-empty{background:transparent;border:none;}
  .cal-cell.cal-today{border:2px solid var(--blue);}
  .cal-daynum{font-weight:700;font-size:12px;margin-bottom:4px;}
  .cal-entry{
    color:#fff;border-radius:4px;padding:2px 4px;margin-bottom:2px;font-size:10px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;
  }
  .cal-more{font-size:10px;color:var(--ink-soft);}
  @media (max-width:700px){
    .cal-cell{min-height:56px;font-size:9px;}
    .cal-grid{gap:3px;}
  }

  .panel-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
  .panel-table th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);
    border-bottom:2px solid var(--line-strong);padding:6px 10px;
  }
  .panel-table td{padding:9px 10px;border-bottom:1px solid var(--line);}
  .panel-row{cursor:pointer;}
  .panel-row:hover{background:var(--bg);}
  .panel-estado-select{
    font-family:inherit;font-size:12.5px;font-weight:700;padding:5px 8px;border-radius:6px;
    border:1.5px solid var(--line-strong);background:#fff;cursor:pointer;
  }

  /* modo simple */
  .simple-app{min-height:100vh;background:var(--bg);padding:16px;}
  .simple-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;}
  .simple-topbar h1{font-size:18px;margin:0;}
  .simple-exit{
    background:var(--surface);border:1px solid var(--line-strong);border-radius:10px;
    padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;color:var(--ink);
  }
  .simple-search{
    width:100%;padding:14px 16px;border:1px solid var(--line-strong);border-radius:10px;
    font-size:16px;margin-bottom:14px;background:var(--surface);
  }
  .simple-empty{text-align:center;color:var(--ink-soft);padding:60px 20px;font-size:15px;}
  .simple-card{
    background:var(--surface);border:1px solid var(--line-strong);border-radius:14px;
    padding:16px 18px;margin-bottom:14px;position:relative;
  }
  .simple-card.urg-atrasado{border-left:6px solid var(--red);}
  .simple-card.urg-hoy{border-left:6px solid var(--mustard);}
  .simple-top-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
  .simple-folio{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:15px;color:var(--ink-soft);}
  .simple-name{font-size:22px;font-weight:700;margin:2px 0 4px;}
  .simple-prenda{font-size:15px;color:var(--ink-soft);margin-bottom:8px;}
  .simple-badge{
    display:inline-block;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:11px;color:#fff;
    padding:4px 10px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;
  }
  .simple-btn{
    display:block;width:100%;padding:18px;border:none;border-radius:12px;
    font-size:19px;font-weight:700;cursor:pointer;margin-top:6px;color:#fff;
  }
  .simple-btn-advance{background:var(--green);}
  .simple-btn-undo{
    background:transparent;border:1px solid var(--line-strong);color:var(--ink-soft);
    font-size:13px;font-weight:600;padding:10px;margin-top:8px;
  }
  .simple-fecha{font-size:13px;color:var(--ink-soft);margin-bottom:2px;}

  .warn-banner{
    background:#FBE9E7;border:1px solid var(--red);color:#7a2a22;padding:8px 14px;font-size:12px;
    border-radius:8px;margin:0 22px 0;
  }
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;
    opacity:0;transition:opacity .25s;pointer-events:none;z-index:50;
  }
  .toast.show{opacity:1;}

  @media (max-width:860px){
    .app{grid-template-columns:1fr;}
    .sidebar{display:flex;}
    .main{display:none;}
    .app.show-detail .sidebar{display:none;}
    .app.show-detail .main{display:block;}
    .back-btn{display:inline-block;}
    .field-row,.money-row{grid-template-columns:1fr;}
  }
  @media print{
    .topbar,.sidebar,.settings-panel,.back-btn,.btn-row,.estado-actions,.warn-banner{display:none !important;}
    .main{padding:0;}
    body{background:#fff;}
  }
</style>
</head>

<div id="root"></div>
<div class="toast" id="toast"></div>

<script type="module">

  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCSPmbUDJBHMyPz4wsLqJqP0EnpBNzWU0E",
    authDomain: "guiastrabajo-86df7.firebaseapp.com",
    projectId: "guiastrabajo-86df7",
    storageBucket: "guiastrabajo-86df7.firebasestorage.app",
    messagingSenderId: "704532531643",
    appId: "1:704532531643:web:d746e95e0968b6030b1c9e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.fsStorage = {

</script>

];

function formatCLP(n){

function formatDate(iso){
  if(!iso) return '';
  const parts = iso.split('-');
  if(parts.length!==3) return iso;
  const [y,m,d]=parts;
  return `${d}-${m}-${y}`;
}

function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getItems(g){
  let items;
  if(g.items && g.items.length) items = g.items;
  else if(g.prenda || g.detalle) items = [{prenda:g.prenda||'', detalle:g.detalle||''}];
  else items = [{prenda:'', detalle:''}];
  return items.map(it=>({
    prenda: it.prenda||'',
    detalle: it.detalle||'',
    fechaEntrega: it.fechaEntrega || g.fechaEntrega || '',
    fechaCustom: !!it.fechaCustom,
    valor: Number(it.valor)||0
  }));
}

// ---------- escáner QR ----------
let scannerStream = null;
let scannerRAF = null;

function openScanner(){
  state.simpleMode = false;
  state.view = 'scanner';
  state.scannerResult = null;
  state.mobileDetail = true;
  render();
  startScanner();
}

function startScanner(){
  if(typeof jsQR !== 'function'){
    const status = document.getElementById('scannerStatus');
    if(status) status.textContent = 'No se pudo cargar el lector de QR (revisa tu conexión a internet).';
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    const status = document.getElementById('scannerStatus');
    if(status) status.textContent = '⚠️ Este navegador no permite acceso a la cámara desde este archivo. La cámara solo funciona si la app está alojada en un sitio con https (o localhost), no al abrirla como archivo local.';
    return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(stream=>{
    scannerStream = stream;
    const video = document.getElementById('scannerVideo');
    if(!video){ stream.getTracks().forEach(t=>t.stop()); return; }
    video.srcObject = stream;
    video.play();
    scannerRAF = requestAnimationFrame(scanTick);
  }).catch(err=>{
    const status = document.getElementById('scannerStatus');
    if(status) status.textContent = '⚠️ No se pudo acceder a la cámara: '+err.message;
  });
}

function stopScanner(){
  if(scannerStream){ scannerStream.getTracks().forEach(t=>t.stop()); scannerStream=null; }
  if(scannerRAF){ cancelAnimationFrame(scannerRAF); scannerRAF=null; }
}

function scanTick(){
  const video = document.getElementById('scannerVideo');
  const canvas = document.getElementById('scannerCanvas');
  if(!video || !canvas){ return; }
  if(video.readyState === video.HAVE_ENOUGH_DATA){
    canvas.height = video.videoHeight; canvas.width = video.videoWidth;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if(code && code.data){
      handleScanResult(code.data);
      return;
    }
  }
  scannerRAF = requestAnimationFrame(scanTick);
}

function handleScanResult(text){
  stopScanner();
  const m = text.match(/Guia N(\d+)/i) || text.match(/folio=(\d+)/i);
  const folio = m ? Number(m[1]) : null;
  const g = folio ? state.guias.find(x=>x.folio===folio) : null;
  state.scannerResult = { text, folio, guiaId: g?g.id:null };
  render();
}

function checkUrlFolio(){
  const params = new URLSearchParams(window.location.search);
  const folioParam = params.get('folio');
  if(!folioParam) return;
  const folio = Number(folioParam);
  const g = state.guias.find(x=>x.folio===folio);
  state.view = 'scanner';
  state.simpleMode = false;
  state.scannerResult = { text:`folio=${folio}`, folio, guiaId: g?g.id:null };
  history.replaceState({}, '', window.location.pathname);
  render();
}

function daysUntil(iso){
  if(!iso) return null;
  const [y,m,d] = iso.split('-').map(Number);
  const target = new Date(y, m-1, d);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((target-today)/86400000);
}

function guiaUrgency(g){
  if(g.estado==='Entregado' || !g.fechaEntrega) return 'none';
  const d = daysUntil(g.fechaEntrega);
  if(d<0) return 'atrasado';
  if(d===0) return 'hoy';
  return 'none';
}

function guiaRank(g){
  const u = guiaUrgency(g);
  if(u==='atrasado') return 0;
  if(u==='hoy') return 1;
  if(g.estado==='Entregado') return 4;
  if(!g.fechaEntrega) return 3;
  return 2;
}

function sortGuias(list){
  return list.slice().sort((a,b)=>{
    const ra = guiaRank(a), rb = guiaRank(b);
    if(ra!==rb) return ra-rb;
    if(ra===2) return daysUntil(a.fechaEntrega)-daysUntil(b.fechaEntrega);
    return (b.folio||0)-(a.folio||0);
  });
}

function addDaysISO(iso, n){
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d+n);
  return dt.getFullYear()+String(dt.getMonth()+1).padStart(2,'0')+String(dt.getDate()).padStart(2,'0');
}

function gcalLink(g){
  const saldo = (Number(g.valor)||0)-(Number(g.abono)||0);
  const start = addDaysISO(g.fechaEntrega, 0);
  const end = addDaysISO(g.fechaEntrega, 1);
  const items = getItems(g);
  const detalleTexto = items.map((it,i)=>`${i+1}. ${it.prenda?it.prenda+': ':''}${it.detalle||''}`).join('\n');
  const text = encodeURIComponent(`Entrega guía N°${g.folio} — ${g.clienteNombre}`);
  const details = encodeURIComponent(`${detalleTexto}\nSaldo pendiente: ${formatCLP(saldo)}\nTeléfono: ${g.clienteTelefono||''}`);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${start}/${end}&details=${details}`;
}

function downloadICS(g){
  const saldo = (Number(g.valor)||0)-(Number(g.abono)||0);
  const start = addDaysISO(g.fechaEntrega, 0);
  const end = addDaysISO(g.fechaEntrega, 1);
  const items = getItems(g);
  const detalleTexto = items.map((it,i)=>`${i+1}. ${it.prenda?it.prenda+': ':''}${it.detalle||''}`).join('\\n');
  const ics = [
    'BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',
    `UID:${g.id}@guias-taller`,
    `DTSTAMP:${new Date().toISOString().replace(/[-:]/g,'').split('.')[0]}Z`,
    `DTSTART;VALUE=DATE:${start}`,
    `DTEND;VALUE=DATE:${end}`,
    `SUMMARY:Entrega guía N°${g.folio} — ${escapeHtml(g.clienteNombre)}`,
    `DESCRIPTION:${detalleTexto}\\nSaldo pendiente: ${formatCLP(saldo)}`,
    'BEGIN:VALARM','TRIGGER:-PT9H','ACTION:DISPLAY','DESCRIPTION:Recordatorio de entrega','END:VALARM',
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  const blob = new Blob([ics], {type:'text/calendar'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `guia-${g.folio}.ics`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function nextEstado(current){

function prevEstado(current){

  return ESTADOS[idx-1].id;
}

function normalizePhone(raw){
  let d = (raw||'').replace(/\D/g,'');
  if(!d) return '';
  if(d.length===9 && d.startsWith('9')) return '56'+d;
  if(d.startsWith('56')) return d;
  if(d.startsWith('0')) d = d.slice(1);
  return d;
}

function buildReminderMessage(g){

function escapeHtml(s){

}

async function loadState(){
  try{
    const data = await window.fsStorage.get();
    if(data){
      state.localName = data.localName || state.localName;
      state.localPhone = data.localPhone || '';
      state.localPublicUrl = data.localPublicUrl || '';
      state.appsScriptUrl = data.appsScriptUrl || state.appsScriptUrl;
      state.passwordHash = data.passwordHash || '';
      state.empleados = data.empleados || [];
      state.guias = data.guias || [];
    }
    state.storageOk = true;
  }catch(e){
    console.error('Error cargando desde Firebase', e);
    state.storageOk = false;
  }
  state.loaded = true;
  state.unlocked = isUnlockedLocally();
  render();
  if(!state.passwordHash || state.unlocked) checkUrlFolio();
}

async function persist(){
  try{
    const payload = {localName:state.localName, localPhone:state.localPhone, localPublicUrl:state.localPublicUrl, appsScriptUrl:state.appsScriptUrl, passwordHash:state.passwordHash, empleados:state.empleados, guias:state.guias};
    const ok = await window.fsStorage.set(payload);
    state.storageOk = !!ok;
  }catch(e){
    state.storageOk = false;
    console.error('Error guardando', e);
  }
  render();
}

async function sha256HexSafe(text){
  try{
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    // Entorno sin contexto seguro (ej. file://): respaldo simple, menos seguro
    return 'PLAIN:'+text;
  }
}

function isUnlockedLocally(){
  try{
    return localStorage.getItem('tallerUnlockHash') === state.passwordHash;
  }catch(e){
    return false;
  }
}

function lockThisDevice(){

function attachLockScreenListeners(){
  const btn = document.getElementById('lockSubmitBtn');
  const input = document.getElementById('lockPasswordInput');
  const errBox = document.getElementById('lockError');
  const doSubmit = async ()=>{
    const val = input.value;
    const hash = await sha256HexSafe(val);
    if(hash === state.passwordHash){
      try{ localStorage.setItem('tallerUnlockHash', state.passwordHash); }catch(e){}
      state.unlocked = true;
      render();
      checkUrlFolio();
    } else {
      errBox.textContent = 'Clave incorrecta';
    }
  };
  if(btn) btn.onclick = doSubmit;
  if(input){

    input.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); doSubmit(); } });

function rulerSVG(){
  let ticks='';
  for(let i=0;i<=60;i++){
    const x = i*10+4;
    const isMajor = i%5===0;
    const h = isMajor?14:7;
    ticks += `<line x1="${x}" y1="0" x2="${x}" y2="${h}" stroke="var(--line-strong)" stroke-width="${isMajor?1.4:1}"/>`;
    if(isMajor){
      ticks += `<text x="${x}" y="24" font-size="8" font-family="Inter, sans-serif" fill="var(--ink-soft)" text-anchor="middle">${i/5}</text>`;
    }
  }
  return `<svg viewBox="0 0 610 26" preserveAspectRatio="none" class="ruler-svg">${ticks}</svg>`;
}

    state.view='empty';
    state.currentId=null;
  }
  state.mobileDetail=false;
  render();
}

function saveForm(e){
  e.preventDefault();
  const f = e.target;
  const items = formItems
    .map(it=>({prenda:(it.prenda||'').trim(), detalle:(it.detalle||'').trim(), fechaEntrega: it.fechaEntrega||'', fechaCustom: !!it.fechaCustom, valor: Number(it.valor)||0}))
    .filter(it=>it.prenda || it.detalle);
  const data = {
    clienteNombre: f.clienteNombre.value.trim(),
    clienteTelefono: f.clienteTelefono.value.trim(),
    clienteEmail: f.clienteEmail.value.trim(),
    fechaCreacion: f.fechaCreacion.value || todayISO(),
    fechaEntrega: f.fechaEntrega.value,
    items: items.length ? items : [{prenda:'', detalle:''}],
    prenda: '', detalle: '', // campos antiguos, ya no se usan (compatibilidad)
    valor: Number(f.valor.value)||0,
    abono: Number(f.abono.value)||0,
    estado: f.estado.value,
    encargado: f.encargado ? f.encargado.value : ''
  };
  if(!data.clienteNombre){ toast('Falta el nombre del cliente'); return; }

  let nuevaGuiaCreada = null;
  if(state.editingId){
    const idx = state.guias.findIndex(g=>g.id===state.editingId);
    if(idx>-1){ state.guias[idx] = {...state.guias[idx], ...data}; }
    state.view='detail';
    state.currentId=state.editingId;
    state.editingId=null;
  } else {
    const g = {id:uid(), folio:nextFolio(), ...data};
    state.guias.unshift(g);
    state.view='detail';
    state.currentId=g.id;
    nuevaGuiaCreada = g;
  }
  persist();
  toast('Guía guardada');

  if(nuevaGuiaCreada){
    printAmbasGuias(nuevaGuiaCreada);
    sendToAppsScript(nuevaGuiaCreada);
  }
}

function deleteGuia(id){
  if(!confirm('¿Eliminar esta guía? Esta acción no se puede deshacer.')) return;
  state.guias = state.guias.filter(g=>g.id!==id);
  state.view='empty';
  state.currentId=null;
  state.mobileDetail=false;
  persist();
}

function setEstado(id, estado){
  const g = state.guias.find(x=>x.id===id);
  if(g){
    g.estado=estado;
    if(estado==='Entregado' && !g.fechaEntregadoReal) g.fechaEntregadoReal = todayISO();
    if(estado!=='Entregado') g.fechaEntregadoReal = '';
    persist();
  }
}

function sendWhatsApp(g, msgOverride){
  const phone = normalizePhone(g.clienteTelefono);
  if(!phone){ toast('Ingresa un teléfono válido'); return; }
  const msg = msgOverride || buildMessage(g);
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function sendSMS(g, msgOverride){
  const phone = normalizePhone(g.clienteTelefono);
  if(!phone){ toast('Ingresa un teléfono válido'); return; }
  const msg = msgOverride || buildMessage(g);
  window.location.href = `sms:${phone}?body=${encodeURIComponent(msg)}`;
}

function sendEmail(g, msgOverride, subjectOverride){
  if(!g.clienteEmail){ toast('Ingresa un correo válido'); return; }
  const subject = encodeURIComponent(subjectOverride || `Guía de trabajo N° ${g.folio} - ${state.localName}`);
  const body = encodeURIComponent((msgOverride || buildMessage(g)).replace(/\*/g,''));
  window.location.href = `mailto:${g.clienteEmail}?subject=${subject}&body=${body}`;
}

function copyMessage(g){
  const msg = buildMessage(g);
  navigator.clipboard.writeText(msg).then(()=>toast('Mensaje copiado')).catch(()=>toast('No se pudo copiar'));
}

function printFullGuideBW(g){
  const saldo = (Number(g.valor)||0)-(Number(g.abono)||0);
  const items = getItems(g);
  const filas = items.map((it,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${escapeHtml(it.prenda||'—')}</td>
      <td>${escapeHtml(it.detalle||'—')}</td>
      <td>${it.fechaEntrega?formatDate(it.fechaEntrega):'—'}</td>
      <td style="text-align:right;">${it.valor?formatCLP(it.valor):'—'}</td>

function findClienteByPhone(phone){
  const norm = normalizePhone(phone);
  if(!norm || norm.length<9) return null;
  const matches = state.guias.filter(x=>normalizePhone(x.clienteTelefono)===norm && x.id!==state.editingId);
  if(matches.length===0) return null;
  return matches.slice().sort((a,b)=>(a.fechaCreacion||'').localeCompare(b.fechaCreacion||'')).pop();
}

function findClienteByName(nombre){
  const n = (nombre||'').trim().toLowerCase();
  if(!n) return null;
  const matches = state.guias.filter(x=>x.clienteNombre.trim().toLowerCase()===n && x.id!==state.editingId);
  if(matches.length===0) return null;
  return matches.slice().sort((a,b)=>(a.fechaCreacion||'').localeCompare(b.fechaCreacion||'')).pop();
}

function renderClienteHistory(phone){
  const box = document.getElementById('clienteHistoryBox');
  if(!box) return;
  const norm = normalizePhone(phone);
  if(!norm || norm.length<9){ box.innerHTML=''; return; }
  const matches = state.guias.filter(x=>normalizePhone(x.clienteTelefono)===norm && x.id!==state.editingId);
  if(matches.length===0){ box.innerHTML=''; return; }
  const items = matches.slice(0,4).map(m=>{
    const prendas = getItems(m).map(it=>it.prenda).filter(Boolean).join(', ');
    return `N°${m.folio} (${formatDate(m.fechaCreacion)}${prendas?' — '+escapeHtml(prendas):''})`;
  }).join(', ');
  box.innerHTML = `<div class="client-history">👤 <strong>Cliente conocido</strong> · ${matches.length} trabajo${matches.length>1?'s':''} anterior${matches.length>1?'es':''}: ${items}${matches.length>4?'…':''}
    <button type="button" id="autofillClienteBtn" class="autofill-btn">↺ Completar nombre y correo</button>
  </div>`;
  const autofillBtn = document.getElementById('autofillClienteBtn');
  if(autofillBtn){
    autofillBtn.onclick = ()=>{
      const latest = findClienteByPhone(phone);
      if(!latest) return;
      const nombreEl = document.querySelector('input[name="clienteNombre"]');
      const emailEl = document.querySelector('input[name="clienteEmail"]');
      if(nombreEl && !nombreEl.value) nombreEl.value = latest.clienteNombre;
      if(emailEl && !emailEl.value && latest.clienteEmail) emailEl.value = latest.clienteEmail;
      toast('Datos del cliente completados');
    };
  }
}

function downloadFile(filename, content, mimeType){
  const blob = new Blob([content], {type:mimeType});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function sendToAppsScript(g){
  if(!state.appsScriptUrl) return;
  try{
    const items = getItems(g);
    const saldo = (Number(g.valor)||0) - (Number(g.abono)||0);
    const detalleTexto = items.map((it,i)=>
      `${i+1}. ${it.prenda?it.prenda+' — ':''}${it.detalle||'(sin descripción)'}${it.valor?' — '+formatCLP(it.valor):''}`
    ).join('\n');
    const payload = {
      local: state.localName,
      folio: g.folio,
      localTelefono: state.localPhone,
      cliente: g.clienteNombre,
      telefono: g.clienteTelefono,
      email: g.clienteEmail,
      fechaIngreso: formatDate(g.fechaCreacion),
      fechaEntrega: g.fechaEntrega ? formatDate(g.fechaEntrega) : 'Por confirmar',
      detalle: detalleTexto,
      valor: formatCLP(g.valor),
      abono: formatCLP(g.abono),
      saldo: formatCLP(saldo)
    };
    await fetch(state.appsScriptUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });
  }catch(e){
    console.error('Error enviando respaldo/correo automático', e);
  }
}

function exportBackupJSON(){
  const payload = {
    exportadoEl: new Date().toISOString(),
    localName: state.localName,
    localPhone: state.localPhone,
    empleados: state.empleados,
    guias: state.guias
  };
  const fecha = todayISO();
  downloadFile(`respaldo-guias-${fecha}.json`, JSON.stringify(payload, null, 2), 'application/json');
  toast('Respaldo descargado');
}

function csvEscape(val){
  const s = String(val??'');
  if(s.includes(',') || s.includes('"') || s.includes('\n')){
    return '"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}

function exportBackupCSV(){
  const headers = ['Folio','Cliente','Telefono','Email','Encargado','FechaIngreso','FechaEntrega','Estado','Prendas','ValorTotal','Abono','Saldo'];
  const rows = state.guias.map(g=>{
    const saldo = (Number(g.valor)||0)-(Number(g.abono)||0);
    const prendas = getItems(g).map(it=>it.prenda).filter(Boolean).join(' | ');
    return [
      g.folio, g.clienteNombre, g.clienteTelefono||'', g.clienteEmail||'', g.encargado||'',
      formatDate(g.fechaCreacion), g.fechaEntrega?formatDate(g.fechaEntrega):'', g.estado,
      prendas, g.valor||0, g.abono||0, saldo
    ].map(csvEscape).join(',');
  });
  const csv = '\uFEFF'+[headers.join(','), ...rows].join('\n');
  const fecha = todayISO();
  downloadFile(`guias-${fecha}.csv`, csv, 'text/csv;charset=utf-8');
  toast('Tabla descargada');
}

function updateSettings(name, phone, publicUrl, newPasswordHash, appsScriptUrl){
  state.localName = name || state.localName;
  state.localPhone = phone;
  state.localPublicUrl = (publicUrl||'').replace(/\/$/,'');
  state.appsScriptUrl = (appsScriptUrl||'').trim();
  if(newPasswordHash!==null && newPasswordHash!==undefined){ state.passwordHash = newPasswordHash; }
  persist();
}

function addEmpleado(nombre){
  const n = (nombre||'').trim();
  if(!n) return;
  if(state.empleados.includes(n)){ toast('Ya está en la lista'); return; }
  state.empleados.push(n);
  persist();
}

function removeEmpleado(nombre){
  state.empleados = state.empleados.filter(e=>e!==nombre);
  persist();
}

        <div>
          <h1>${escapeHtml(state.localName)}</h1>
          <div class="sub">Guías de trabajo</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="gear" id="scanBtn" title="Escanear código QR de una prenda">📷</button>
        <button class="gear" id="calendarBtn" title="Calendario de entregas">📅</button>
        <button class="gear" id="simpleModeBtn" title="Modo simple (botones grandes)">📱</button>
        <button class="gear" id="summaryBtn" title="Resumen del día">📊</button>
        <button class="gear" id="gearBtn" title="Configurar local">⚙︎</button>
      </div>
    </div>
    ${state.showSettings ? `
      <div class="settings-panel">
        <label>Nombre del local
          <input id="setName" value="${escapeHtml(state.localName)}">
        </label>
        <label>Teléfono del local (opcional, solo referencia)
          <input id="setPhone" value="${escapeHtml(state.localPhone)}">
        </label>
        <label style="flex:1;min-width:260px;">Enlace público de esta app (para que los QR abran directo, ej: https://tunombre.github.io/guias-taller.html)
          <input id="setPublicUrl" placeholder="https://tunombre.github.io/guias-taller.html" value="${escapeHtml(state.localPublicUrl)}">
        </label>
        <label style="flex:1;min-width:260px;">Link del script de Google (respaldo en Drive + correo automático)
          <input id="setAppsScriptUrl" placeholder="https://script.google.com/macros/s/.../exec" value="${escapeHtml(state.appsScriptUrl)}">
        </label>
        <label style="flex:1;min-width:220px;">Clave de acceso ${state.passwordHash?'(ya configurada — deja vacío para no cambiarla)':'(opcional)'}
          <input type="password" id="setPassword" placeholder="${state.passwordHash?'••••••••':'Sin clave configurada'}">
        </label>
        <button class="btn btn-primary" id="saveSettings">Guardar</button>
        ${state.passwordHash ? `
          <button class="btn btn-ghost" id="clearPasswordBtn">Quitar clave</button>
          <button class="btn btn-ghost" id="lockDeviceBtn">🔒 Cerrar sesión en este equipo</button>
        ` : ''}
      </div>
      ${!state.localPublicUrl ? `<div class="urgency-banner" style="margin:0 22px 10px;"><span class="ub-item ub-today">💡 Sin el enlace público, los QR seguirán funcionando solo con el botón 📷 dentro de la app.</span></div>` : ''}
      <div class="settings-panel" style="border-top:none;padding-top:0;flex-direction:column;align-items:flex-start;">
        <label style="width:100%;">📦 Respaldo de tus datos</label>
        <div style="font-size:11.5px;color:var(--ink-soft);max-width:600px;">Descarga una copia de todas tus guías. Guárdala en tu carpeta de Google Drive (o cualquier respaldo) para no perder nada si algo falla.</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">
          <button class="btn btn-ghost" id="exportJsonBtn">💾 Respaldo completo (.json)</button>
          <button class="btn btn-ghost" id="exportCsvBtn">📊 Tabla de guías (.csv, se abre en Excel)</button>
        </div>
      </div>
      <div class="settings-panel" style="border-top:none;padding-top:0;">
        <label style="flex:1;min-width:200px;">Agregar persona del equipo
          <input id="newEmpleadoInput" placeholder="Nombre del encargado/a">
        </label>
        <button class="btn btn-ghost" id="addEmpleadoBtn">+ Agregar</button>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${state.empleados.map(emp=>`
            <span class="emp-chip">${escapeHtml(emp)} <button data-remove-emp="${escapeHtml(emp)}">✕</button></span>
          `).join('') || `<span style="font-size:12px;color:var(--ink-soft);">Aún no agregas a nadie del equipo.</span>`}
        </div>
      </div>
    ` : ''}
    ${!state.storageOk ? `<div class="warn-banner" style="margin-top:10px;">No se pudo conectar al almacenamiento. Los cambios podrían no guardarse — revisa tu conexión.</div>` : ''}

    <div class="app ${state.mobileDetail ? 'show-detail':''}">
      <div class="sidebar">
        <div class="sidebar-head">
          <input class="search-input" id="searchInput" placeholder="Buscar por folio, nombre o teléfono…" value="${escapeHtml(state.search)}">
          <div class="chips">
            <button class="chip ${state.filterEstado==='todas'?'active':''}" data-estado="todas">Todas (${state.guias.length})</button>
            ${ESTADOS.map(e=>`<button class="chip ${state.filterEstado===e.id?'active':''}" data-estado="${e.id}">${e.id} (${state.guias.filter(g=>g.estado===e.id).length})</button>`).join('')}
          </div>
          ${state.empleados.length>0 ? `
          <div class="emp-filter-row">
            <button class="chip ${state.filterEmpleado==='todos'?'active':''}" data-emp="todos">Todo el equipo</button>
            ${state.empleados.map(emp=>`<button class="chip ${state.filterEmpleado===emp?'active':''}" data-emp="${escapeHtml(emp)}">${escapeHtml(emp)} (${state.guias.filter(g=>g.encargado===emp).length})</button>`).join('')}
          </div>` : ''}
        </div>
        <button class="new-btn" id="newBtn">+ Nueva guía de trabajo</button>
        ${(numAtrasados>0 || numHoy>0) ? `
          <div class="urgency-banner">
            ${numAtrasados>0 ? `<span class="ub-item ub-late">🔴 ${numAtrasados} atrasado${numAtrasados>1?'s':''}</span>`:''}
            ${numHoy>0 ? `<span class="ub-item ub-today">🟠 ${numHoy} vence${numHoy>1?'n':''} hoy</span>`:''}
          </div>
        ` : ''}
        <div class="ticket-list">
          ${filtered.length===0 ? `<div class="empty-list">No hay guías${state.search||state.filterEstado!=='todas'?' que coincidan':' aún'}.</div>` :
            filtered.map(g=>{
              const urg = guiaUrgency(g);
              return `
              <div class="ticket-item urg-${urg} ${state.currentId===g.id?'active':''}" data-id="${g.id}">
                <div class="row1">
                  <span class="folio">N° ${g.folio}</span>
                  <span class="mono" style="font-size:11px;">${formatDate(g.fechaCreacion)}</span>
                </div>
                <div class="name">${escapeHtml(g.clienteNombre)}</div>
                <div class="meta"><span class="estado-dot" style="background:${estadoColor(g.estado)}"></span>${escapeHtml(g.estado)} · Saldo ${formatCLP((g.valor||0)-(g.abono||0))}${g.encargado?' · '+escapeHtml(g.encargado):''}</div>
                ${urg==='atrasado' ? `<div class="urg-tag urg-tag-late">Atrasado desde ${formatDate(g.fechaEntrega)}</div>` : ''}
                ${urg==='hoy' ? `<div class="urg-tag urg-tag-today">Vence hoy</div>` : ''}
              </div>
            `;}).join('')
          }
        </div>
      </div>

      <div class="main">
        ${renderMain(filtered)}
      </div>
    </div>
  `;

  attachListeners();
}

function renderMain(filteredList){
  if(state.view==='summary'){
    return renderSummary();
  }
  if(state.view==='calendar'){
    return renderCalendar();
  }
  if(state.view==='scanner'){
    return renderScanner();

function renderSimpleMode(){
  const term = state.simpleSearch.toLowerCase();
  const list = sortGuias(state.guias.filter(g=>{
    if(g.estado==='Entregado') return false;
    if(!term) return true;
    return String(g.folio).includes(term) || g.clienteNombre.toLowerCase().includes(term);
  }));

  return `
    <div class="simple-app">
      <div class="simple-topbar">
        <h1>🧵 ${escapeHtml(state.localName)}</h1>
        <div style="display:flex;gap:8px;">
          <button class="simple-exit" id="simpleScanBtn">📷 Escanear</button>
          <button class="simple-exit" id="exitSimpleBtn">🖥️ Modo completo</button>
        </div>
      </div>
      <input class="simple-search" id="simpleSearchInput" placeholder="Buscar por nombre o folio…" value="${escapeHtml(state.simpleSearch)}">
      ${list.length===0 ? `<div class="simple-empty">🎉 No quedan trabajos pendientes${term?' que coincidan con la búsqueda':''}.</div>` :
        list.map(g=>{
          const urg = guiaUrgency(g);
          const next = nextEstado(g.estado);
          const prev = prevEstado(g.estado);
          return `
          <div class="simple-card urg-${urg}">
            <div class="simple-top-row">
              <span class="simple-folio">N° ${g.folio}</span>
            </div>
            <div class="simple-name">${escapeHtml(g.clienteNombre)}</div>
            ${(()=>{ const prendas = getItems(g).map(it=>it.prenda).filter(Boolean).join(', '); return prendas ? `<div class="simple-prenda">${escapeHtml(prendas)}</div>` : ''; })()}
            <div class="simple-fecha">${g.fechaEntrega ? `Entrega: ${formatDate(g.fechaEntrega)}${urg==='atrasado'?' — ATRASADO':(urg==='hoy'?' — HOY':'')}` : 'Sin fecha de entrega'}</div>
            <span class="simple-badge" style="background:${estadoColor(g.estado)}">${escapeHtml(g.estado)}</span>
            ${next ? `<button class="simple-btn simple-btn-advance" data-advance="${g.id}">${estadoActionLabel(next)}</button>` : ''}
            ${prev ? `<button class="simple-btn simple-btn-undo" data-revert="${g.id}">↩️ Deshacer último cambio</button>` : ''}
          </div>
        `;}).join('')
      }
    </div>
  `;
}

function attachSimpleListeners(){
  const exitBtn = document.getElementById('exitSimpleBtn');
  if(exitBtn) exitBtn.onclick = ()=>{ state.simpleMode=false; render(); };

  const simpleScanBtn = document.getElementById('simpleScanBtn');
  if(simpleScanBtn) simpleScanBtn.onclick = openScanner;

  const searchInput = document.getElementById('simpleSearchInput');
  if(searchInput){
    searchInput.oninput = (e)=>{
      const pos = e.target.selectionStart;
      state.simpleSearch = e.target.value;
      render();
      const el = document.getElementById('simpleSearchInput');
      el.focus();
      el.setSelectionRange(pos, pos);
    };
  }

  document.querySelectorAll('[data-advance]').forEach(btn=>{
    btn.onclick = ()=>{
      const g = state.guias.find(x=>x.id===btn.dataset.advance);
      const next = nextEstado(g.estado);
      if(next) setEstado(g.id, next);
    };
  });
  document.querySelectorAll('[data-revert]').forEach(btn=>{
    btn.onclick = ()=>{
      const g = state.guias.find(x=>x.id===btn.dataset.revert);
      const prev = prevEstado(g.estado);
      if(prev) setEstado(g.id, prev);
    };
  });
}

function renderCalendar(){
  const [y,m] = state.calendarMonth.split('-').map(Number);
  const firstDay = new Date(y, m-1, 1);
  const daysInMonth = new Date(y, m, 0).getDate();
  const startWeekday = (firstDay.getDay()+6)%7; // 0=lunes
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const todayStr = todayISO();

  // Mapa fecha -> lista de {guia, item, prenda}
  const map = {};
  state.guias.forEach(g=>{
    getItems(g).forEach(it=>{
      const d = it.fechaEntrega || g.fechaEntrega;
      if(!d) return;
      if(!map[d]) map[d]=[];
      map[d].push({g, prenda: it.prenda});
    });
  });

  let cells = '';
  for(let i=0;i<startWeekday;i++){ cells += `<div class="cal-cell cal-empty"></div>`; }
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entries = map[dateStr] || [];
    const isToday = dateStr===todayStr;
    cells += `
      <div class="cal-cell ${isToday?'cal-today':''}">
        <div class="cal-daynum">${d}</div>
        ${entries.slice(0,3).map(e=>`<div class="cal-entry" data-id="${e.g.id}" style="background:${estadoColor(e.g.estado)};" title="${escapeHtml(e.g.clienteNombre)} — ${escapeHtml(e.prenda||'')}">N°${e.g.folio} ${escapeHtml(e.g.clienteNombre)}</div>`).join('')}
        ${entries.length>3 ? `<div class="cal-more">+${entries.length-3} más</div>` : ''}
      </div>
    `;
  }

  const [py,pm] = m===1 ? [y-1,12] : [y,m-1];
  const [ny,nm] = m===12 ? [y+1,1] : [y,m+1];

  return `
    <button class="back-btn" id="backBtn">← Volver a la lista</button>
    <div class="cal-header">
      <button class="btn btn-ghost" id="calPrevBtn">← Mes anterior</button>
      <h2 style="margin:0;font-size:18px;">${monthNames[m-1]} ${y}</h2>
      <button class="btn btn-ghost" id="calNextBtn">Mes siguiente →</button>
    </div>
    <div class="cal-grid cal-grid-header">
      <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="mono" style="font-size:11px;color:var(--ink-soft);margin-top:10px;">Haz clic en una entrega para abrir esa guía.</div>
  `;
}

function renderSummary(){
  const today = todayISO();
  const entreganHoy = state.guias.filter(g=>g.fechaEntrega===today && g.estado!=='Entregado');
  const ingresaronHoy = state.guias.filter(g=>g.fechaCreacion===today);
  const entregadosHoy = state.guias.filter(g=>g.fechaEntregadoReal===today);
  const abonosHoy = ingresaronHoy.reduce((s,g)=>s+(Number(g.abono)||0),0);
  const valorHoy = ingresaronHoy.reduce((s,g)=>s+(Number(g.valor)||0),0);
  const atrasados = state.guias.filter(g=>guiaUrgency(g)==='atrasado');

  const listOrNone = (arr)=> arr.length ? arr.map(g=>`<div>N°${g.folio} — ${escapeHtml(g.clienteNombre)}</div>`).join('') : '<div>Ninguno</div>';

  return `
    <button class="back-btn" id="backBtn">← Volver a la lista</button>
    <h2 style="margin:0 0 4px;font-size:18px;">Resumen del día — ${formatDate(today)}</h2>
    <div class="summary-grid">
      <div class="summary-card">
        <div class="num">${entreganHoy.length}</div>
        <div class="lbl">Por entregar hoy</div>
        <div class="summary-list">${listOrNone(entreganHoy)}</div>
      </div>
      <div class="summary-card">
        <div class="num">${entregadosHoy.length}</div>
        <div class="lbl">Ya entregados hoy</div>
        <div class="summary-list">${listOrNone(entregadosHoy)}</div>
      </div>
      <div class="summary-card">
        <div class="num">${ingresaronHoy.length}</div>
        <div class="lbl">Ingresos nuevos hoy</div>
        <div class="summary-list">${listOrNone(ingresaronHoy)}</div>
      </div>
      <div class="summary-card">
        <div class="num">${atrasados.length}</div>
        <div class="lbl">Trabajos atrasados</div>
        <div class="summary-list">${listOrNone(atrasados)}</div>
      </div>
      <div class="summary-card">
        <div class="num">${formatCLP(abonosHoy)}</div>
        <div class="lbl">Abonado en ingresos de hoy</div>
      </div>
      <div class="summary-card">
        <div class="num">${formatCLP(valorHoy)}</div>
        <div class="lbl">Valor total agendado hoy</div>
      </div>
    </div>
    <div class="summary-note">* Los montos de "hoy" se calculan sobre las guías creadas hoy. Si registras un abono en una guía de otro día, ese pago no queda separado por fecha.</div>
  `;
}

function attachListeners(){
  attachItemListeners();

  const brandHome = document.getElementById('brandHome');
  if(brandHome) brandHome.onclick = ()=>{
    state.view='empty'; state.currentId=null; state.editingId=null; state.mobileDetail=false; render();
  };

  const addItemBtn = document.getElementById('addItemBtn');
  if(addItemBtn) addItemBtn.onclick = ()=>{
    const fechaGuia = document.querySelector('input[name="fechaEntrega"]')?.value || '';
    formItems.push({prenda:'', detalle:'', fechaEntrega:fechaGuia, fechaCustom:false, valor:0});
    refreshItemsContainer();
  };

  const fechaEntregaGuiaInput = document.querySelector('input[name="fechaEntrega"]');
  if(fechaEntregaGuiaInput){
    fechaEntregaGuiaInput.oninput = ()=>{
      const val = fechaEntregaGuiaInput.value;
      formItems.forEach(it=>{ if(!it.fechaCustom) it.fechaEntrega = val; });
      refreshItemsContainer();
    };
  }

  const valorGuiaInput = document.querySelector('input[name="valor"]');
  if(valorGuiaInput){
    valorGuiaInput.oninput = ()=>{ formTotalCustom = true; };
  }

  const gearBtn = document.getElementById('gearBtn');
  if(gearBtn) gearBtn.onclick = ()=>{ state.showSettings=!state.showSettings; render(); };

  const saveSettings = document.getElementById('saveSettings');
  if(saveSettings) saveSettings.onclick = async ()=>{
    const newPass = document.getElementById('setPassword').value;
    const newHash = newPass ? await sha256HexSafe(newPass) : null;
    updateSettings(
      document.getElementById('setName').value.trim(),
      document.getElementById('setPhone').value.trim(),
      document.getElementById('setPublicUrl').value.trim(),
      newHash,
      document.getElementById('setAppsScriptUrl').value.trim()
    );
    if(newHash){
      try{ localStorage.setItem('tallerUnlockHash', newHash); }catch(e){}
      state.unlocked = true;
      toast('Clave guardada. Este equipo queda desbloqueado.');
    }
  };

  const clearPasswordBtn = document.getElementById('clearPasswordBtn');
  if(clearPasswordBtn) clearPasswordBtn.onclick = ()=>{
    if(!confirm('¿Quitar la clave de acceso? Cualquiera con el link podrá entrar.')) return;
    state.passwordHash = '';
    try{ localStorage.removeItem('tallerUnlockHash'); }catch(e){}
    persist();
    toast('Clave eliminada');
  };

  const lockDeviceBtn = document.getElementById('lockDeviceBtn');
  if(lockDeviceBtn) lockDeviceBtn.onclick = ()=>{
    state.showSettings = false;
    lockThisDevice();
  };

  const exportJsonBtn = document.getElementById('exportJsonBtn');
  if(exportJsonBtn) exportJsonBtn.onclick = exportBackupJSON;

  const exportCsvBtn = document.getElementById('exportCsvBtn');
  if(exportCsvBtn) exportCsvBtn.onclick = exportBackupCSV;

  const addEmpleadoBtn = document.getElementById('addEmpleadoBtn');
  if(addEmpleadoBtn) addEmpleadoBtn.onclick = ()=>{
    const input = document.getElementById('newEmpleadoInput');
    addEmpleado(input.value);
    input.value='';
  };
  const newEmpleadoInput = document.getElementById('newEmpleadoInput');
  if(newEmpleadoInput) newEmpleadoInput.onkeydown = (e)=>{
    if(e.key==='Enter'){ e.preventDefault(); addEmpleado(newEmpleadoInput.value); newEmpleadoInput.value=''; }
  };
  document.querySelectorAll('[data-remove-emp]').forEach(btn=>{
    btn.onclick = ()=> removeEmpleado(btn.dataset.removeEmp);
  });

  const summaryBtn = document.getElementById('summaryBtn');
  if(summaryBtn) summaryBtn.onclick = ()=>{ state.view='summary'; state.mobileDetail=true; render(); };

  const calendarBtn = document.getElementById('calendarBtn');
  if(calendarBtn) calendarBtn.onclick = ()=>{ state.view='calendar'; state.mobileDetail=true; render(); };

  const calPrevBtn = document.getElementById('calPrevBtn');
  if(calPrevBtn) calPrevBtn.onclick = ()=>{
    const [y,m] = state.calendarMonth.split('-').map(Number);
    const [py,pm] = m===1 ? [y-1,12] : [y,m-1];
    state.calendarMonth = `${py}-${String(pm).padStart(2,'0')}`;
    render();
  };
  const calNextBtn = document.getElementById('calNextBtn');
  if(calNextBtn) calNextBtn.onclick = ()=>{
    const [y,m] = state.calendarMonth.split('-').map(Number);
    const [ny,nm] = m===12 ? [y+1,1] : [y,m+1];
    state.calendarMonth = `${ny}-${String(nm).padStart(2,'0')}`;
    render();
  };
  document.querySelectorAll('.cal-entry').forEach(el=>{
    el.onclick = ()=> openDetail(el.dataset.id);
  });

  const scanBtn = document.getElementById('scanBtn');
  if(scanBtn) scanBtn.onclick = openScanner;

  const scanAgainBtn = document.getElementById('scanAgainBtn');
  if(scanAgainBtn) scanAgainBtn.onclick = ()=>{ state.scannerResult=null; render(); startScanner(); };

  const scanAdvanceBtn = document.getElementById('scanAdvanceBtn');
  if(scanAdvanceBtn) scanAdvanceBtn.onclick = ()=>{
    const g = state.guias.find(x=>x.id===scanAdvanceBtn.dataset.id);
    const next = nextEstado(g.estado);
    if(next) setEstado(g.id, next);
    toast('Estado actualizado');
    state.scannerResult=null;
    render();
    startScanner();
  };

  const scanViewBtn = document.getElementById('scanViewBtn');
  if(scanViewBtn) scanViewBtn.onclick = ()=> openDetail(scanViewBtn.dataset.id);

  const simpleModeBtn = document.getElementById('simpleModeBtn');
  if(simpleModeBtn) simpleModeBtn.onclick = ()=>{ state.simpleMode=true; render(); };

  document.querySelectorAll('[data-emp]').forEach(c=>{
    c.onclick = ()=>{ state.filterEmpleado = c.dataset.emp; render(); };
  });

  const phoneInput = document.querySelector('input[name="clienteTelefono"]');
  if(phoneInput){
    renderClienteHistory(phoneInput.value);
    phoneInput.oninput = ()=> renderClienteHistory(phoneInput.value);
  }

  const nombreInput = document.querySelector('input[name="clienteNombre"]');
  if(nombreInput){
    const tryAutofill = ()=>{
      const match = findClienteByName(nombreInput.value);
      if(!match) return;
      const emailEl = document.querySelector('input[name="clienteEmail"]');
      let filled = false;
      if(phoneInput && !phoneInput.value && match.clienteTelefono){ phoneInput.value = match.clienteTelefono; filled=true; }
      if(emailEl && !emailEl.value && match.clienteEmail){ emailEl.value = match.clienteEmail; filled=true; }
      if(filled){ toast('Datos del cliente completados automáticamente'); renderClienteHistory(phoneInput.value); }
    };
    nombreInput.addEventListener('input', tryAutofill);
    nombreInput.addEventListener('blur', tryAutofill);
  }

  const searchInput = document.getElementById('searchInput');
  if(searchInput){
    searchInput.oninput = (e)=>{
      const pos = e.target.selectionStart;
      state.search = e.target.value;
      render();
      const el = document.getElementById('searchInput');
      el.focus();
      el.setSelectionRange(pos, pos);
    };
  }

  document.querySelectorAll('.chip').forEach(c=>{
    c.onclick = ()=>{ state.filterEstado = c.dataset.estado; render(); };
  });

  const newBtn = document.getElementById('newBtn');
  if(newBtn) newBtn.onclick = openNewForm;

  document.querySelectorAll('.ticket-item').forEach(item=>{
    item.onclick = ()=> openDetail(item.dataset.id);
  });

  document.querySelectorAll('.panel-row').forEach(row=>{
    row.onclick = (e)=>{
      if(e.target.closest('.panel-estado-select')) return;
      openDetail(row.dataset.id);
    };
  });

  document.querySelectorAll('.panel-estado-select').forEach(sel=>{
    sel.onclick = (e)=> e.stopPropagation();
    sel.onchange = (e)=>{
      e.stopPropagation();
      setEstado(sel.dataset.id, sel.value);
      toast('Estado actualizado');
    };
  });

  const backBtn = document.getElementById('backBtn');
  if(backBtn) backBtn.onclick = backToList;

  const form = document.getElementById('guiaForm');
  if(form) form.onsubmit = saveForm;

  const cancelForm = document.getElementById('cancelForm');
  if(cancelForm) cancelForm.onclick = ()=>{
    state.view = state.editingId ? 'detail':'empty';
    state.currentId = state.editingId || state.currentId;
    state.editingId=null;
    render();
  };

  const waBtn = document.getElementById('waBtn');
  if(waBtn) waBtn.onclick = ()=> sendWhatsApp(state.guias.find(g=>g.id===state.currentId));

  const smsBtn = document.getElementById('smsBtn');
  if(smsBtn) smsBtn.onclick = ()=> sendSMS(state.guias.find(g=>g.id===state.currentId));

  const emailBtn = document.getElementById('emailBtn');
  if(emailBtn) emailBtn.onclick = ()=> sendEmail(state.guias.find(g=>g.id===state.currentId));

  const copyBtn = document.getElementById('copyBtn');
  if(copyBtn) copyBtn.onclick = ()=> copyMessage(state.guias.find(g=>g.id===state.currentId));

  const editBtn = document.getElementById('editBtn');
  if(editBtn) editBtn.onclick = ()=> openEdit(state.currentId);

  const gcalBtn = document.getElementById('gcalBtn');
  if(gcalBtn) gcalBtn.onclick = ()=>{
    const g = state.guias.find(x=>x.id===state.currentId);
    window.open(gcalLink(g), '_blank');
  };

  const icsBtn = document.getElementById('icsBtn');
  if(icsBtn) icsBtn.onclick = ()=>{
    const g = state.guias.find(x=>x.id===state.currentId);
    downloadICS(g);
  };

  const remindWaBtn = document.getElementById('remindWaBtn');
  if(remindWaBtn) remindWaBtn.onclick = ()=>{
    const g = state.guias.find(x=>x.id===state.currentId);
    sendWhatsApp(g, buildReminderMessage(g));
  };
  const remindSmsBtn = document.getElementById('remindSmsBtn');
  if(remindSmsBtn) remindSmsBtn.onclick = ()=>{
    const g = state.guias.find(x=>x.id===state.currentId);
    sendSMS(g, buildReminderMessage(g));
  };
  const remindEmailBtn = document.getElementById('remindEmailBtn');
  if(remindEmailBtn) remindEmailBtn.onclick = ()=>{
    const g = state.guias.find(x=>x.id===state.currentId);
    sendEmail(g, buildReminderMessage(g), `Tu prenda está lista o por vencer — Guía N° ${g.folio}`);
  };

  const printBtn = document.getElementById('printBtn');
  if(printBtn) printBtn.onclick = ()=> printFullGuideBW(state.guias.find(g=>g.id===state.currentId));

  const labelBtn = document.getElementById('labelBtn');
  if(labelBtn) labelBtn.onclick = ()=> printLabel(state.guias.find(g=>g.id===state.currentId));

  const deleteBtn = document.getElementById('deleteBtn');
  if(deleteBtn) deleteBtn.onclick = ()=> deleteGuia(state.currentId);

  document.querySelectorAll('[data-setestado]').forEach(btn=>{
    btn.onclick = ()=> setEstado(state.currentId, btn.dataset.setestado);
  });
}

window.addEventListener('firebase-ready', loadState);
setTimeout(()=>{ if(!window.fsStorage) loadState(); }, 6000);
</script>
</body>
</html>
